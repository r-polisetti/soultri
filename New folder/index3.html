<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Soultri | Premium Bakery</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- AOS -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

<style>
html {
  scroll-behavior: smooth;
}

/* 🔥 Scroll progress bar */
#progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  background: #c9a96e;
  width: 0%;
  z-index: 9999;
}

/* 🔥 Parallax effect */
.parallax {
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
}

/* 🔥 Magnetic button */
.magnetic {
  transition: transform 0.15s ease;
}
</style>

</head>

<body class="bg-[#f7f5f2] text-gray-800">

<!-- PROGRESS BAR -->
<div id="progress"></div>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-[#1f3d2b] text-white flex justify-between items-center px-5 py-4 z-50">
  <div class="font-semibold">🍰 Soultri</div>

  <div class="space-x-4 hidden md:block">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO (PARALLAX) -->
<section id="home"
  class="min-h-screen flex items-center justify-center text-center text-white parallax"
  style="background-image: linear-gradient(rgba(31,61,43,0.75), rgba(31,61,43,0.75)), url('https://images.unsplash.com/photo-1517433670267-08bbd4be890f');">

  <div data-aos="fade-up">
    <h1 class="text-5xl md:text-7xl font-bold">Soultri</h1>
    <p class="mt-3">Where every bite feels like home</p>

    <button class="magnetic mt-6 bg-[#c9a96e] px-6 py-2 rounded-full">
      Order Now
    </button>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="min-h-screen flex items-center justify-center text-center px-4">
  <div data-aos="fade-up">
    <h2 class="text-4xl font-semibold mb-4">About Us</h2>
    <p class="max-w-xl text-gray-600">
      Soultri creates handcrafted desserts made with love and premium ingredients.
    </p>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products" class="min-h-screen flex items-center justify-center bg-white px-4">

  <div class="text-center w-full">

    <h2 class="text-4xl font-semibold mb-10" data-aos="fade-up">
      Our Products
    </h2>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-5 max-w-4xl mx-auto">

      <div class="product-card bg-white shadow-md p-5 rounded-xl cursor-pointer"
           data-name="Chocolate Cake"
           data-desc="Rich chocolate layered cake with premium cocoa."
           data-aos="zoom-in">
        🍰 Cakes
      </div>

      <div class="product-card bg-white shadow-md p-5 rounded-xl cursor-pointer"
           data-name="Fresh Croissant"
           data-desc="Buttery, flaky French-style croissant."
           data-aos="zoom-in">
        🥐 Fresh Bakes
      </div>

      <div class="product-card bg-white shadow-md p-5 rounded-xl cursor-pointer"
           data-name="Dessert Box"
           data-desc="Assorted mini desserts curated daily."
           data-aos="zoom-in">
        🧁 Desserts
      </div>

    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="min-h-screen flex items-center justify-center bg-[#1f3d2b] text-white text-center px-4">
  <div data-aos="fade-up">
    <h2 class="text-4xl font-semibold mb-4">Contact</h2>
    <p>📍 Hyderabad</p>

    <button class="magnetic mt-5 bg-[#c9a96e] px-6 py-2 rounded-full">
      WhatsApp Order
    </button>
  </div>
</section>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl max-w-sm text-center">
    <h3 id="modalTitle" class="text-2xl font-semibold"></h3>
    <p id="modalDesc" class="text-gray-600 mt-2"></p>

    <button onclick="closeModal()" class="mt-4 bg-[#1f3d2b] text-white px-4 py-2 rounded-full">
      Close
    </button>
  </div>
</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init({ duration: 800, once: true });</script>

<!-- PROGRESS BAR -->
<script>
window.onscroll = function () {
  let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  let scrolled = (winScroll / height) * 100;
  document.getElementById("progress").style.width = scrolled + "%";
};
</script>

<!-- MODAL LOGIC -->
<script>
const modal = document.getElementById("modal");
const title = document.getElementById("modalTitle");
const desc = document.getElementById("modalDesc");

document.querySelectorAll(".product-card").forEach(card => {
  card.addEventListener("click", () => {
    title.textContent = card.dataset.name;
    desc.textContent = card.dataset.desc;
    modal.classList.remove("hidden");
  });
});

function closeModal() {
  modal.classList.add("hidden");
}
</script>

<!-- MAGNETIC BUTTON EFFECT -->
<script>
document.querySelectorAll(".magnetic").forEach(btn => {
  btn.addEventListener("mousemove", (e) => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
  });

  btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0,0)";
  });
});
</script>

</body>
</html>
